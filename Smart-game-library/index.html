<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Умная библиотека игр</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>Умная библиотека игр</h1>
		<p>Здесь можно найти игры по душе</p>
	</header>

	<main>
		<div class="filters">
		<form id="searchForm" class="filters__form">
			<input type="text" id="searchInput" placeholder="Найти игру" class="filters__input">
		</form>


		<select name="" id="genreFilter" class="filters__select"></select>
		<select name="" id="statusFilter" class="filters__select"></select>
		<select name="" id="sortSelect" class="filters__select">
			<option value="default">Без сортировки</option>
			<option value="rating">По рейтингу</option>
			<option value="year">По году</option>
			<option value="playTime">По времени прохождения</option>
		</select>
	</div>
		<section>
			<h2>Мои игры</h2>
			<p id="gamesCount" class="games-count"></p>
			<div id="gameList">

			</div>
		</section>
	</main>

	<script type="module" src="app.js"></script>
</body>
</html>
